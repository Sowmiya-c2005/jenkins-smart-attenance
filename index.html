<!DOCTYPE html>
<html>
<head>
    <title>Smart Attendance System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>🎓 Smart Attendance System</h1>

    <div class="card">

        <input type="text" id="name" placeholder="Enter Student Name">

        <div class="buttons">
            <button class="present" onclick="addPresent()">Mark Present ✔</button>
            <button class="absent" onclick="addAbsent()">Mark Absent ❌</button>
        </div>

        <h3>Attendance List</h3>

        <ul id="list"></ul>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
